name: Generate Stats SVG

on:
  push:
    branches: [main]
    paths:
      - "data/*.json"

  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - run: npm run generate

      - name: Commit generated SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats.svg
          if git diff --cached --quiet; then
            echo "No changes to stats.svg"
          else
            git commit -m "chore: regenerate stats.svg"
            git push
          fi
